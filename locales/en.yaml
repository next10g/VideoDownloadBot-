# Language name
name: English
# Commands
help: |
  😎 Send me a video link and I'll download it to this chat!

  /help — this message
  /language — change language
  /audio — download as audio only

  Developer: <b>Nour Mohamed</b> — @Dev_Nour_M
language: 😶 Please select a language.
language_selected: 😎 English selected.
audio_on: 📣 I'll convert downloads to audio only.
audio_off: 🎥 I'll download video as usual.
# Progress states
status_validating: 🔍 Checking your link...
status_queued: 🕐 Added to queue — your turn is coming!
status_queued_wait: 🕐 Queue is busy. Estimated wait ~${minutes} min.
status_downloading: ⬇️ Downloading...
status_uploading: ⬆️ Uploading to Telegram...
status_sending_cached: ⚡ Found in cache — sending now...
status_completed: ✅ Done! Enjoy.
# Legacy keys
download_started: ⬇️ Downloading...
uploading_started: ⬆️ Uploading to Telegram...
download_complete: ✅ Done!
# Buttons
btn_retry: 🔄 Try again
btn_join_channel: 📢 Join channel
btn_check_subscription: ✅ I joined — check again
# Subscription
subscription_required: |
  📢 Please join our channel to use this bot.

  Tap **Join channel**, then **I joined — check again**.
subscription_required_short: Please join the channel first.
subscription_confirmed: ✅ Thanks! You can use the bot now.
# Caption
video_caption: |
  <b>${title}</b>
  Downloaded with @${bot} — Developer: <a href="https://t.me/Dev_Nour_M">Nour Mohamed</a>
# Errors
error_cannot_start_download: 😱 Couldn't start the download. Tap **Try again** or resend the link.
error_invalid_url: 🔗 That doesn't look like a valid video link.
error_cache_or_download_job: 😱 Something went wrong. Please try again.
error_video_download: 😓 Download failed. The source may be blocked.
error_video_upload: 😓 Upload to Telegram failed. Try again shortly.
error_unsupported_url: 🚫 This website isn't supported.
error_no_suitable_video_size: 📦 No file under the size limit was found.
error_reboot: 🔄 Server restarted during your download. Send the link again.
error_cooldown: ⏳ Please wait ${seconds}s before another link.
error_duplicate_url: ⏳ This link is already in progress.
error_user_job_limit: ⏳ Wait until your current download finishes.
error_livestream: 📡 Live streams aren't supported.
error_playlist: 📋 Playlists aren't supported. Send a single video link.
error_duration_too_long: ⏱ This video is too long for this server.
error_blacklisted_domain: 🚫 This domain isn't allowed.
error_user_blocked: 🚫 Too many failed attempts. Try again in ${minutes} min.
error_suspicious_source: 🚫 This source is temporarily restricted.
error_retry_spam: ⏳ Too many retries. Wait a moment.
error_retry_no_url: 🔗 Send the video link again to retry.
error_youtube_cooldown: ⏳ YouTube — wait ${seconds}s before another link (public bot, fair use).
error_youtube_bot: |
  ▶️ YouTube is temporarily unavailable from this server.

  Try again later, or use TikTok / Instagram / another site.
  This is a <b>public</b> bot — it does not use your personal login or cookies.

  Contact @Dev_Nour_M if it keeps failing.
error_private_bot: |
  🔒 This bot is <b>private</b> for Nour Mohamed only (@Dev_Nour_M).

  Not available to others.
