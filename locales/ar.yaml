# أخطاء
error_cannot_start_download: 😱 معرفتش أبدأ التحميل. دوس **جرّب تاني** أو ابعت اللينك مرة تانية.
error_invalid_url: 🔗 اللينك مش مظبوط. ابعت لينك فيديو مباشر.
error_cache_or_download_job: 😱 حصلت مشكلة وأنا بابدأ. جرّب تاني.
error_facebook_download: |
  📘 فيسبوك رفض الرابط (Cannot parse data).

  جرّب:
  • «Copy link» من التطبيق (مش Share فقط)
  • لينك عام (مش جروب خاص)
  • بعد تحديث yt-dlp على السيرفر

  @Dev_Nour_M لو استمرّت المشكلة
error_video_download: 😓 التحميل فشل. يمكن المصدر مقفول أو مش متاح.
error_video_upload: 😓 الرفع على تيليجرام فشل. جرّب بعد شوية.
error_unsupported_url: 🚫 الموقع ده مش مدعوم.
error_no_suitable_video_size: 📦 مفيش ملف مناسب تحت حد الحجم.
error_reboot: 🔄 السيرفر اتعمله ريستارت وأنت بتنزل. ابعت اللينك تاني.
error_cooldown: ⏳ استنى ${seconds} ثانية قبل ما تبعت لينك تاني.
error_duplicate_url: ⏳ اللينك ده شغال عليه دلوقتي.
error_user_job_limit: ⏳ استنى لحد ما التحميل الحالي يخلص.
error_livestream: 📡 البث المباشر مش مدعوم.
error_playlist: 📋 قوايم التشغيل مش مدعومة. ابعت لينك فيديو واحد.
error_duration_too_long: ⏱ الفيديو طويل أوي على السيرفر ده.
error_blacklisted_domain: 🚫 الدومين ده ممنوع.
error_user_blocked: 🚫 محاولات فاشلة كتير. جرّب بعد ${minutes} دقيقة.
error_suspicious_source: 🚫 المصدر ده متوقف مؤقتاً.
error_retry_spam: ⏳ محاولات كتير. استنى شوية.
error_retry_no_url: 🔗 ابعت لينك الفيديو تاني عشان نجرّب.
error_youtube_disabled: |
  ⏸ يوتيوب متوقف مؤقتاً على السيرفر (حظر IP من غوغل).
  جرّب فيسبوك أو انستغرام أو TikTok.
error_no_carousel: ❌ مفيش ألبوم صور في اللينك ده. جرّب /auto أو /image.
error_instagram_restricted: |
  🔒 المحتوى ده مقفول لجمهور معيّن على انستغرام — البوت مش مسجّل دخول ومش هيقدر يفتحه.
  جرّب بوست عام أو انسخ اللينك من حساب عام.
error_instagram_login: |
  🔐 انستغرام مش بيسمح بتحميل اللينك ده من غير حساب.
error_instagram_private: |
  🔒 البوست ده خاص أو لحسابات متابعة فقط — البوت عام ومش بيسجّل دخول انستغرام.
error_instagram_photo_only: |
  📷 مقدرناش نجيب صور البوست ده من انستغرام (بوست عام بس).
  جرّب /image أو /carousel أو /auto.
error_instagram_video_only: |
  🎬 انستغرام: البوت بينزّل **فيديو وريلز** بس (yt-dlp).
  صور الكاروسيل متوقفة على السيرفر — ابعت رابط /reel/ أو بوست فيه فيديو.
  استخدم /video أو /auto.
error_no_image: ❌ مفيش صورة في اللينك ده. جرّب /carousel أو /auto.
error_youtube_cooldown: "⏳ يوتيوب: استنى ${seconds} ثانية قبل لينك تاني (البوت عام ومش بيستخدم حسابك)."
error_youtube_bot: |
  ▶️ يوتيوب مش متاح دلوقتي (السيرفر أو خدمة التحميل مشغولة).

  جرّب بعد دقيقة، أو لينك تيك توك / انستغرام.
  البوت <b>عام</b> — مفيش حاجة تسجّلها من جهازك.

  @Dev_Nour_M لو استمرّت المشكلة
error_private_bot: "🔒 الأمر ده مش متاح."
mylinks_empty: "مفيش روابط محفوظة لسه. نزّل حاجة الأول 😊"
