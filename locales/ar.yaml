help: |
  😎 ابعت رابط وأنا أنزّلهولك هنا.

  الأوامر:
  /start — القائمة
  /auto — ذكي (افتراضي): فيديو / صوت / صورة / ملف / ألبوم
  /video — فيديو بأعلى جودة متاحة (لحد 16K لو المصدر يدعم)
  /audio — صوت
  /image — صورة
  /mylinks — روابطك اللي نزلتها قبل كده
  /statsme — حجم التحميلات وعدد الملفات
  /zip — ابعت لحد 10 صور (أو ألبوم) يتضغطوا ZIP
  /sticker — حوّل صورة لستيكر (رد على صورة أو ابعت صورة)
  /refer — دعوة أصحابك
  /language — اللغة

  درايف وملفات: PDF، Excel، Word، TXT… ابعت الرابط في الوضع الذكي.

  انستا: الفيديو من غير اسم البوت في الوصف.
  ألبوم صور: اختار «ألبوم» من القائمة.

  المطور: Nour Mohamed — @Dev_Nour_M
help_admin: |
  أوامر الأدمن (إنت بس):
  /admin — لوحة التحكم
  /stats — إحصائيات
  /users — مستخدم + روابطه
