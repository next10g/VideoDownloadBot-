name: العربية (مصر)
# الأوامر
welcome: |
  👋 أهلاً بيك في <b>Easy Way</b> — بوت تحميل الفيديوهات!

  📎 ابعت <b>لينك</b> من أي موقع (يوتيوب، تيك توك، فيسبوك، انستغرام…)
  وبعدين اختار: <b>فيديو</b> / <b>صوت</b> / <b>صورة</b> والجودة.

  /download — شرح الاستخدام
  /language — اللغة
  /refer — شارك البوت واكسب دعوات
  /audio — وضع صوت افتراضي
  /image — وضع صورة (قبل ما تبعت اللينk)

  المطور: <b>Nour Mohamed</b> — @Dev_Nour_M
welcome_menu: |
  👋 إيزي واي · @${bot}
  👥 ${users} مستخدم

  📎 ابعت أي رابط (يوتيوب، تيك توك، فيسبوك، انستا، درايف، ملفات PDF وإكسل…)
  الوضع الذكي يختار لوحده: فيديو / صوت / صورة / ألبوم / ملف.

  وضعك الحالي: ${mode}

  من الأزرار أو:
  /auto · /video · /audio · /image · /carousel · /mylinks · /statsme · /zip · /sticker
